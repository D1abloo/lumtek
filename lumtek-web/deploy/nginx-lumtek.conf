# Plantilla Nginx — Lumtek (SPA Vite + SSL con Certbot)
# Ruta en el servidor: /etc/nginx/sites-available/lumtek
#
# Instalación:
#   ln -sf /etc/nginx/sites-available/lumtek /etc/nginx/sites-enabled/lumtek
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d lumtek.es -d www.lumtek.es
#
# Tras migrar desde nip.io, opcional: deploy/nginx-redirect-nip.conf.example

server {
    listen 80;
    listen [::]:80;
    server_name lumtek.es www.lumtek.es;

    # Tras certbot, suele añadirse redirección a HTTPS.
    # Si aún no hay SSL, sirve el sitio en HTTP:
    root /var/www/lumtek;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}

